---
# 1. Ensure directory ownership + directory permissions (2770)
- name: Set directory ownership and permissions
  file:
    path: "{{ guac_files }}/{{ quarter }}"
    state: directory
    owner: ansible
    group: ansible-admin
    mode: "2770"
    recurse: yes
  delegate_to: localhost
  become: true

# 2. Find all files under the quarter directory
- name: Find all files
  find:
    paths: "{{ guac_files }}/{{ quarter }}"
    file_type: file
  register: found_files
  delegate_to: localhost
  become: true

# 3. Apply file permissions (0660)
- name: Apply file permissions
  file:
    path: "{{ item.path }}"
    owner: ansible
    group: ansible-admin
    mode: "0660"
  loop: "{{ found_files.files }}"
  delegate_to: localhost
  become: true
