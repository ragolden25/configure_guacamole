---
# save_images.yml

# =====================================================================
# 1.0 Read versions (local)
# =====================================================================

- name: 1.1 Read guacd version
  slurp:
    src: "{{ guacd_build }}/{{ quarter }}/VERSION"
  register: guacd_version_raw

- name: 1.2 Read guacamole version
  slurp:
    src: "{{ guacamole_build }}/{{ quarter }}/VERSION"
  register: guacamole_version_raw

- name: 1.3 Read tomcat version
  slurp:
    src: "{{ tomcat_build }}/{{ quarter }}/VERSION"
  register: tomcat_version_raw

- name: 1.4 Read nginx version
  slurp:
    src: "{{ build_root }}/nginx/{{ quarter }}/VERSION"
  register: nginx_version_raw

- name: 1.5 Read postgres version
  slurp:
    src: "{{ build_root }}/postgres/{{ quarter }}/VERSION"
  register: postgres_version_raw

- set_fact:
    guacd_version: "{{ guacd_version_raw.content | b64decode | trim }}"
    guacamole_version: "{{ guacamole_version_raw.content | b64decode | trim }}"
    tomcat_version: "{{ tomcat_version_raw.content | b64decode | trim }}"
    nginx_version: "{{ nginx_version_raw.content | b64decode | trim }}"
    postgres_version: "{{ postgres_version_raw.content | b64decode | trim }}"

# =====================================================================
# 2.0 Save Docker images to tar.gz (local)
# =====================================================================

- name: 2.1 Save guacd image
  command:
    cmd: >
      docker save ccop/guacd:{{ guacd_version }}
      -o guacd-{{ guacd_version }}.tar.gz
    chdir: "{{ guacd_build }}/{{ quarter }}"

- name: 2.2 Save guacamole image
  command:
    cmd: >
      docker save ccop/guacamole:{{ guacamole_version }}
      -o guacamole-{{ guacamole_version }}.tar.gz
    chdir: "{{ guacamole_build }}/{{ quarter }}"

- name: Save Tomcat functional image
  command:
    cmd: >
      docker save ccop/tomcat:{{ tomcat_version }}
      -o tomcat-ccop-{{ tomcat_version }}.tar.gz
    chdir: "{{ tomcat_build }}/{{ quarter }}"

- name: Save Tomcat hardened image
  command:
    cmd: >
      docker save nucleus/tomcat:{{ tomcat_version }}
      -o tomcat-nucleus-{{ tomcat_version }}.tar.gz
    chdir: "{{ tomcat_build }}/{{ quarter }}"

# =====================================================================
# 2B. Save nginx + postgres images (using component scripts)
# =====================================================================

- name: Save nginx image
  command:
    cmd: >
      {{ build_root }}/nginx/scripts/save_nginx_image.sh
      {{ nginx_version }} {{ quarter }}

- name: Save postgres image
  command:
    cmd: >
      {{ build_root }}/postgres/scripts/save_postgres_image.sh
      {{ postgres_version }} {{ quarter }}

# =====================================================================
# 3.0 Move artifacts into avocado tree (local copy)
# =====================================================================

- name: 3.1 Ensure quarterly artifact directory exists
  file:
    path: "{{ guac_files }}/{{ quarter }}/images"
    state: directory

- name: 3.2 Copy guacd artifact into avocado images
  copy:
    src: "{{ guacd_build }}/{{ quarter }}/guacd-{{ guacd_version }}.tar.gz"
    dest: "{{ guac_files }}/{{ quarter }}/images/guacd-{{ guacd_version }}.tar.gz"
    remote_src: yes

- name: 3.3 Copy guacamole artifact into avocado images
  copy:
    src: "{{ guacamole_build }}/{{ quarter }}/guacamole-{{ guacamole_version }}.tar.gz"
    dest: "{{ guac_files }}/{{ quarter }}/images/guacamole-{{ guacamole_version }}.tar.gz"
    remote_src: yes

- name: 3.4 Copy functional tomcat-ccop artifact into avocado images
  copy:
    src: "{{ tomcat_build }}/{{ quarter }}/tomcat-ccop-{{ tomcat_version }}.tar.gz"
    dest: "{{ guac_files }}/{{ quarter }}/images/tomcat-ccop-{{ tomcat_version }}.tar.gz"
    remote_src: yes

- name: 3.5 Copy hardened tomcat-nucleus artifact into avocado images
  copy:
    src: "{{ tomcat_build }}/{{ quarter }}/tomcat-nucleus-{{ tomcat_version }}.tar.gz"
    dest: "{{ guac_files }}/{{ quarter }}/images/tomcat-nucleus-{{ tomcat_version }}.tar.gz"
    remote_src: yes

- name: 3.6 Copy nginx artifact into avocado images
  copy:
    src: "{{ build_root }}/nginx/{{ quarter }}/nginx-{{ nginx_version }}.tar.gz"
    dest: "{{ guac_files }}/{{ quarter }}/images/nginx-{{ nginx_version }}.tar.gz"
    remote_src: yes

- name: 3.7 Copy postgres artifact into avocado images
  copy:
    src: "{{ build_root }}/postgres/{{ quarter }}/postgres-{{ postgres_version }}.tar.gz"
    dest: "{{ guac_files }}/{{ quarter }}/images/postgres-{{ postgres_version }}.tar.gz"
    remote_src: yes

# =====================================================================
# 5.0 Cleanup on ansible
# =====================================================================

- name: 5.1 Prune unused Docker data on ansible
  command: docker system prune -af --volumes
